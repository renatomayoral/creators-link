steps:
  # ─── Build Next.js Docker image ───────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - build
      - '--file=Dockerfile'
      - '--tag=us-central1-docker.pkg.dev/$PROJECT_ID/creators-link/web:$SHORT_SHA'
      - '--tag=us-central1-docker.pkg.dev/$PROJECT_ID/creators-link/web:latest'
      - '--cache-from=us-central1-docker.pkg.dev/$PROJECT_ID/creators-link/web:latest'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '.'

  # ─── Push to Artifact Registry ────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    waitFor: [build]
    args:
      - push
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/creators-link/web'

  # ─── Deploy to Cloud Run ──────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - creatorslink
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/creators-link/web:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--service-account=cloudrun-web@$PROJECT_ID.iam.gserviceaccount.com'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--concurrency=80'
      - '--timeout=60s'
      - '--allow-unauthenticated'
      - >-
        --set-env-vars=NODE_ENV=production,NEXT_PUBLIC_APP_DOMAIN=creatorslink.org,NEXT_PUBLIC_APP_URL=https://creatorslink.org,BETTER_AUTH_URL=https://creatorslink.org,GCP_PROJECT=$PROJECT_ID,GCP_ZONE=us-central1-f,GCS_BUCKET=mktia-ai-studio-outputs,CLOUD_PROVIDER=gcp,NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=@CreatorsLinkOrgBot
      - >-
        --set-secrets=DATABASE_URL=DATABASE_URL:latest,BETTER_AUTH_SECRET=BETTER_AUTH_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,STRIPE_PRICE_SPARK=STRIPE_PRICE_SPARK:latest,STRIPE_PRICE_CREATOR=STRIPE_PRICE_CREATOR:latest,STRIPE_PRICE_PRO=STRIPE_PRICE_PRO:latest,CRON_SECRET=CRON_SECRET:latest,TELEGRAM_API_ID=TELEGRAM_API_ID:latest,TELEGRAM_API_HASH=TELEGRAM_API_HASH:latest,TELEGRAM_USER_AUTH_STRING=TELEGRAM_USER_AUTH_STRING:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_WEBHOOK_SECRET=TELEGRAM_WEBHOOK_SECRET:latest,BOOMFI_API_KEY=BOOMFI_API_KEY:latest,BOOMFI_WEBHOOK_PUBLIC_KEY=BOOMFI_WEBHOOK_PUBLIC_KEY:latest,BOOMFI_PARTNERS_API_KEY=BOOMFI_PARTNERS_API_KEY:latest,BOOMFI_PARTNERS_SIGNING_SECRET=BOOMFI_PARTNERS_SIGNING_SECRET:latest,BOOMFI_PLATFORM_ACCOUNT_REF=BOOMFI_PLATFORM_ACCOUNT_REF:latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true

timeout: 1200s

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/creators-link/web:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/creators-link/web:latest'
